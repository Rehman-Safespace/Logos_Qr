<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with dark premium gradient -->
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <!-- Central glow -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <!-- Linear metallic stroke accent -->
    <linearGradient id="stroke-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Outer Rounded Shield Base -->
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Subtle Grid lines representing linguistic matrices -->
  <g stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.07">
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
  </g>

  <!-- Inner core glowing aura -->
  <circle cx="256" cy="256" r="180" fill="url(#core-glow)" />

  <!-- The Deconstructed Structural Monolith (Central Symbol) -->
  <g fill="none" stroke="url(#stroke-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer concentric hexagon -->
    <polygon points="256,96 394,176 394,336 256,416 118,336 118,176" stroke-opacity="0.2" />
    
    <!-- Active linguistic aligns / force vectors -->
    <polygon points="256,128 366,192 366,320 256,384 146,320 146,192" stroke-width="12" />
    
    <!-- Central focal alignment triad -->
    <circle cx="256" cy="256" r="28" fill="#0f172a" stroke="#ffffff" stroke-width="6" />
    
    <!-- Axis lines showing absolute alignment to reality -->
    <line x1="256" y1="128" x2="256" y2="228" stroke="#ffffff" stroke-width="4" />
    <line x1="146" y1="320" x2="231" y2="271" stroke="#38bdf8" stroke-width="4" />
    <line x1="366" y1="320" x2="281" y2="271" stroke="#6366f1" stroke-width="4" />
  </g>

  <!-- Title / Logo text (optional styling element) -->
  <text x="256" y="465" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="bold" fill="#38bdf8" letter-spacing="8" text-anchor="middle" opacity="0.8">LOGOS 0o2</text>
</svg>
